name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - claude/windows-program-exe-3hze70
    paths:
      - "windows/**"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build EXE
        shell: pwsh
        run: ./build_exe.ps1

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkflowUpdater-exe
          path: windows/WorkflowUpdater.exe
