name: Upload latest AAB to Google Play

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Run ID of the android-release.yml workflow to download AAB from (optional - uses latest if not specified)'
        required: false
        type: string

jobs:
  upload-aab:
    name: Upload latest AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AAB from artifact
        id: download
        run: |
          set -e
          
          # Determine which run to download from
          if [[ -n "${{ github.event.inputs.build_run_id }}" ]]; then
            RUN_ID="${{ github.event.inputs.build_run_id }}"
            echo "Using specified run ID: $RUN_ID"
          else
            # Get the latest successful android-release.yml run
            echo "Fetching latest successful android-release.yml run..."
            RUN_ID=$(gh run list \
              --workflow=android-release.yml \
              --status=success \
              --limit=1 \
              --json=databaseId \
              --jq='.[0].databaseId')
            
            if [[ -z "$RUN_ID" ]]; then
              echo "No successful android-release.yml runs found"
              exit 1
            fi
            echo "Found latest run ID: $RUN_ID"
          fi
          
          # Download the AAB artifact
          echo "Downloading AAB artifact from run $RUN_ID..."
          gh run download "$RUN_ID" \
            --name='app-release-aab-*' \
            --dir=./aab-download
          
          # Find the downloaded AAB file
          DOWNLOADED_AAB=$(find ./aab-download -type f -name '*.aab' | head -1)
          if [[ -z "$DOWNLOADED_AAB" ]]; then
            echo "Error: No .aab file found in downloaded artifact"
            exit 1
          fi
          
          echo "Downloaded AAB: $DOWNLOADED_AAB"
          echo "aab_path=$DOWNLOADED_AAB" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release notes (use latest commit message)
        run: |
          mkdir -p release-notes
          git log -1 --pretty=%B > release-notes/whatsnew-en-IN
          echo "Wrote release-notes/whatsnew-en-IN"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: in.rdokk.workflowupdater
          releaseFiles: ${{ steps.download.outputs.aab_path }}
          track: closed
          whatsNewDirectory: release-notes
