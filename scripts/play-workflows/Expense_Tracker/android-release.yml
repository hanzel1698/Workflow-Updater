name: Android Release Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate release notes for APK
        run: python3 scripts/generate-android-release-notes.py .

      - name: Install Play upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPECTED_SHA1: ${{ secrets.ANDROID_UPLOAD_CERT_SHA1 || '9F:16:81:6B:0F:51:AE:3F:92:57:9E:51:9E:62:1A:C7:0A:2F:2D:7D' }}
        run: |
          set -euo pipefail
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 is not set."
            echo "Run ~/.android/signing/sync-github-secrets.ps1 with your Play upload keystore."
            exit 1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Error: ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD must all be set."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          KEYSTORE_FILE="$RUNNER_TEMP/signing/upload-keystore.jks"
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
          if [ ! -s "$KEYSTORE_FILE" ]; then
            echo "Error: decoded keystore is empty."
            exit 1
          fi
          echo "KEYSTORE_FILE=$KEYSTORE_FILE" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA1=$EXPECTED_SHA1" >> "$GITHUB_ENV"
          norm_sha1() { echo "$1" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]'; }
          ACTUAL_SHA1=$(keytool -list -v -keystore "$KEYSTORE_FILE" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" | grep -i "SHA1:" | head -1 | sed -E 's/.*SHA1:[[:space:]]*//')
          if keytool -list -v -keystore "$KEYSTORE_FILE" -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" | grep -q "CN=Android Debug"; then
            echo "Error: GitHub signing secret contains the Android debug keystore. Google Play requires your upload keystore."
            exit 1
          fi
          if [ "$(norm_sha1 "$ACTUAL_SHA1")" != "$(norm_sha1 "$EXPECTED_SHA1")" ]; then
            echo "Error: Upload keystore SHA1 ($ACTUAL_SHA1) does not match Play upload key ($EXPECTED_SHA1)."
            echo "Replace ~/.android/signing/upload-keystore.jks with the Play upload keystore, then run sync-github-secrets.ps1."
            exit 1
          fi
          echo "Upload keystore fingerprint OK: $ACTUAL_SHA1"

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Find APK
        id: apk
        run: |
          APK=$(find . -path "*/build/outputs/apk/release/*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "Error: release APK not found"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK")" >> "$GITHUB_OUTPUT"

      - name: Find AAB
        id: aab
        run: |
          AAB=$(find . -path "*/build/outputs/bundle/release/*.aab" | head -1)
          if [ -z "$AAB" ]; then
            echo "Error: release AAB not found"
            exit 1
          fi
          echo "path=$AAB" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$AAB")" >> "$GITHUB_OUTPUT"

      - name: Verify AAB Play signing certificate
        run: |
          set -euo pipefail
          AAB="${{ steps.aab.outputs.path }}"
          CERT=$(unzip -Z1 "$AAB" | grep -E '^META-INF/.*\.(RSA|EC)$' | head -1)
          unzip -p "$AAB" "$CERT" | keytool -printcert | tee /tmp/aab-signing-cert.txt
          if grep -q "CN=Android Debug" /tmp/aab-signing-cert.txt; then
            echo "Error: AAB is signed with the Android debug key."
            exit 1
          fi
          norm_sha1() { echo "$1" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]'; }
          ACTUAL_SHA1=$(grep -i "SHA1:" /tmp/aab-signing-cert.txt | head -1 | sed -E 's/.*SHA1:[[:space:]]*//')
          if [ "$(norm_sha1 "$ACTUAL_SHA1")" != "$(norm_sha1 "$EXPECTED_SHA1")" ]; then
            echo "Error: AAB SHA1 ($ACTUAL_SHA1) does not match Play upload key ($EXPECTED_SHA1)."
            exit 1
          fi
          echo "AAB signing certificate OK: $ACTUAL_SHA1"

      - name: Extract app version
        id: version
        run: |
          GRADLE_FILE=$(find . -path "*/app/build.gradle.kts" | head -1)
          VERSION_NAME=$(grep -E 'versionName\s*=' "$GRADLE_FILE" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E 'versionCode\s*=' "$GRADLE_FILE" | head -1 | sed -E 's/.*=\s*([0-9]+).*/\1/')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}-build${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.tag }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ steps.version.outputs.tag }}
          path: ${{ steps.aab.outputs.path }}
          retention-days: 30

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ steps.apk.outputs.path }},${{ steps.aab.outputs.path }}
          tag: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.name }} (build ${{ github.run_number }})
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          makeLatest: true
          body: |
            **Version:** ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})
            **Commit:** ${{ github.sha }}

            Download the APK to sideload on a device, or the AAB to upload to Google Play.
